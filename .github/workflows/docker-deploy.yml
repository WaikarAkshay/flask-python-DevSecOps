name: deploy code on self hosted runner in docker container
on: 
  workflow_run:
    workflows: ["build and push docker image"]
    types:
      - completed
jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    env:
      DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: setup docker compose
        uses: docker/setup-compose-action@v2

      - name: deploy using docker compose file
        run : docker compose up -d --pull always --force-recreate