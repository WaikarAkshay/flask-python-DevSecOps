name: python lint
on: 
  push:
    branches:
      [master]
  workflow_dispatch:
jobs:
  validate:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]

    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: set up python ${{ matrix.python-version}}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version}}
      - name: install dependencies
        run: pip install -r requirement.txt
      - name: Run linter
        run: flake8 app.py
        
