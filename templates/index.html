<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>DevOps Utility Dashboard</title>

<style>

body{
    font-family: "Segoe UI", sans-serif;
    background:#0f172a;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    background:#1e293b;
    padding:40px;
    border-radius:12px;
    width:420px;
    box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.card{
    background:#334155;
    padding:15px;
    border-radius:8px;
    margin-bottom:12px;
}

.label{
    font-size:13px;
    color:#cbd5f5;
}

.value{
    font-size:18px;
    margin-top:5px;
}

.tip{
    margin-top:20px;
    background:#6366f1;
    padding:15px;
    border-radius:8px;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    border:none;
    background:#22c55e;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

</style>

</head>

<body>

<div class="container">

<h1>DevOps Utility Dashboard</h1>

<div class="card">
<div class="label">Hostname</div>
<div class="value" id="hostname">Loading...</div>
</div>

<div class="card">
<div class="label">Python Version</div>
<div class="value" id="python">Loading...</div>
</div>

<div class="card">
<div class="label">Server Time</div>
<div class="value" id="time">Loading...</div>
</div>

<div class="tip" id="tip">
Loading DevOps tip...
</div>

<button onclick="loadData()">Refresh Data</button>

</div>

<script>

async function loadData(){

const response = await fetch("/api/system-info")
const data = await response.json()

document.getElementById("Servername").innerText = data.server
document.getElementById("python").innerText = data.python_versions
document.getElementById("time").innerText = data.time
document.getElementById("tip").innerText = "DevOps Tip: " + data.devops_tip

}

loadData()

</script>

</body>
</html>
